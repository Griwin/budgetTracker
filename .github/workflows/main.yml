name: CI - Symfony API

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: budget_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, intl, pdo_pgsql
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        working-directory: budgetTrackerApi
        run: composer install --no-interaction --prefer-dist

      - name: Prepare test env
        working-directory: budgetTrackerApi
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/budget_test?serverVersion=16&charset=utf8"
        run: |
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        working-directory: budgetTrackerApi
        env:
          APP_ENV: test
          DATABASE_URL: "postgresql://app:app@127.0.0.1:5432/budget_test?serverVersion=16&charset=utf8"
        run: php bin/phpunit